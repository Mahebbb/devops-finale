name: CI/CD Pipeline
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build image Docker
        run: docker build -t mahebois/node-api:latest ./app
      - name: Push image Docker
        run: docker push mahebois/node-api:latest
      - name: Deploy sur k3s
        run: |
          export KUBECONFIG=/home/runner/.kube/config
          kubectl apply -f k8s/mysql.yaml
          kubectl apply -f k8s/api.yaml
          kubectl rollout restart deployment/node-api
      - name: Verify monitoring node-k3s
        run: curl -s http://192.168.56.101:9100/metrics | head -3
      - name: Verify monitoring node-monitoring
        run: curl -s http://192.168.56.103:9100/metrics | head -3
